<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | AXON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #050508 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            padding: 2rem;
            max-width: 600px;
        }
        
        h1 {
            font-size: 8rem;
            background: linear-gradient(135deg, #00d4ff, #b300ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        
        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        
        p {
            color: #a0a0b0;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #00d4ff;
            margin-left: 1rem;
        }
        
        .btn-outline:hover {
            background: #00d4ff;
            color: #050508;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 5rem; }
            h2 { font-size: 1.3rem; }
            .btn { display: block; margin: 0.5rem 0; }
            .btn-outline { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>🔍 Página no encontrada</h2>
        <p>Lo sentimos, la página que buscas no existe o ha sido movida.</p>
        <div>
            <a href="/" class="btn">🏠 Volver al inicio</a>
            <a href="javascript:history.back()" class="btn btn-outline">⬅️ Atrás</a>
        </div>
    </div>
</body>
</html>
