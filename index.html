    <link rel="stylesheet" href="css/animaciones.css">

    <style>
        /* ── Loader inicial optimizado ── */
        #initialLoader {
            position:fixed;inset:0;background:var(--bg-primary,#fff);display:flex;
            flex-direction:column;align-items:center;justify-content:center;
            z-index:9999;transition:opacity .4s ease-out;
        }
        #initialLoader.hidden { 
            opacity:0;pointer-events:none; 
        }
        .init-logo { 
            font-size:clamp(2rem,5vw,3.5rem); 
            font-weight:800; 
            background:linear-gradient(135deg,#1565c0,#1976d2);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            margin-bottom:.75rem; 
            animation:fadeInUp 0.8s ease-out;
        }
        .init-sub { 
            color:var(--text-muted,#6b7280); 
            font-size:clamp(.85rem,2vw,1rem); 
            margin-bottom:2rem;
            animation:fadeInUp 0.8s ease-out .2s both;
        }
        .init-spin { 
            width:clamp(28px,8vw,40px); 
            height:clamp(28px,8vw,40px); 
            border:3px solid var(--border-color,#e5e7eb);
            border-top-color:var(--primary,#1565c0); 
            border-radius:50%; 
            animation:spin 1s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* ── Dark mode toggle mejorado ── */
        #darkModeToggle {
            background:var(--glass-bg,rgba(255,255,255,.1));
            backdrop-filter:blur(10px);
            border:1px solid var(--border-color,rgba(255,255,255,.25));
            border-radius:12px;
            padding:.4rem .8rem;
            cursor:pointer;
            font-size:1.1rem;
            transition:all .2s ease;
            color:var(--text-primary,#fff);
        }
        #darkModeToggle:hover {
            background:var(--glass-bg-hover,rgba(255,255,255,.2));
            transform:scale(1.05);
        }

        /* ── Mejoras responsive ── */
        @media (max-width:768px) {
            .user-info { gap:.5rem; }
            .user-avatar { font-size:1.2rem !important; }
        }
    </style>
</head>
<body class="loading">

<!-- ── Service Worker (PWA) ── -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/AXON-V2/sw.js')
            .catch(err => console.warn('SW registration failed:', err));
    });
}
</script>

<!-- ── Script principal (único punto de entrada) ─────────────────────────── -->
<script type="module" src="js/app.js"></script>

<script>
// ── Polyfills y utilidades globales ──
(function() {
    'use strict';
    
    // Smooth scroll polyfill
    if (!window.scrollToSmooth) {
        window.scrollToSmooth = (target, duration = 500) => {
            const start = window.pageYOffset;
            const distance = target - start;
            const startTime = performance.now();
            
            const animate = (now) => {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                window.scrollTo(0, start + distance * easeProgress);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            };
            requestAnimationFrame(animate);
        };
    }

    // Custom event polyfill
    (function() {
        if (typeof window.CustomEvent === 'function') return;
        
        function CustomEvent(event, params) {
            params = params || { bubbles: false, cancelable: false, detail: undefined };
            const evt = document.createEvent('CustomEvent');
            evt.initCustomEvent(event, params.bubbles, params.cancelable, params.detail);
            return evt;
        }
        
        CustomEvent.prototype = window.Event.prototype;
        window.CustomEvent = CustomEvent;
    })();

    // Global utilities (usadas en páginas dinámicas)
    window.togglePwd = function(id) {
        const el = document.getElementById(id);
        if (el) {
            el.type = el.type === 'password' ? 'text' : 'password';
            const icon = el.nextElementSibling?.querySelector('svg');
            if (icon) icon.style.transform = el.type === 'password' ? 'rotate(0deg)' : 'rotate(180deg)';
        }
    };

    window.checkStrength = function(val) {
        const bar = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        if (!bar || !label) return;
        
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        
        const levels = [
            {w:'0%', color:'#e5e7eb', text:'Vacío'},
            {w:'25%', color:'#ef4444', text:'Muy débil'},
            {w:'50%', color:'#f59e0b', text:'Regular'},
            {w:'75%', color:'#3b82f6', text:'Buena'},
            {w:'100%', color:'#10b981', text:'Excelente'}
        ];
        
        const level = levels[score] || levels[0];
        bar.style.width = level.w;
        bar.style.background = level.color;
        label.textContent = level.text;
        label.style.color = level.color;
    };

    // Intersection Observer para lazy loading
    if ('IntersectionObserver' in window) {
        window.lazyLoadImages = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.classList.remove('lazy');
                    window.lazyLoadImages.unobserve(img);
                }
            });
        });
    }

    // Ocultar loader gradualmente
    const hideLoader = () => {
        const loader = document.getElementById('initialLoader');
        if (loader) {
            loader.classList.add('hidden');
            document.body.classList.remove('loading');
        }
    };

    // Esperar app.js y ocultar loader
    window.addEventListener('appReady', hideLoader);
    setTimeout(hideLoader, 4000); // Fallback máximo 4s
})();
</script>
