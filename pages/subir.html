<!-- pages/subir.html — AXON-V2 ✅ CORREGIDO
     FIX PRINCIPAL: onclick="submitArchivo()" en HTML inline NO puede llamar
     funciones de <script type="module"> porque los módulos tienen scope propio.
     SOLUCIÓN: reemplazar onclick inline por addEventListener dentro del módulo,
     y usar data-action para los botones. -->
<div class="container fade-in" style="max-width:680px;margin:0 auto;padding:1rem;">
    <div class="form-card">
        <div style="text-align:center;margin-bottom:2rem;">
            <h2>📤 Subir Laboratorio</h2>
            <p style="color:var(--text-muted,#6b7280);">Comparte recursos con la comunidad</p>
        </div>

        <div id="userInfo" style="display:none;background:#e8f5e9;padding:10px 14px;border-radius:8px;margin-bottom:1rem;">
            ✅ Subiendo como: <strong id="userEmailDisplay"></strong>
        </div>
        <div id="noAuthMsg" style="display:none;background:#fff3cd;padding:10px 14px;border-radius:8px;margin-bottom:1rem;text-align:center;">
            ⚠️ Debes <a href="#login" style="color:#1565c0;font-weight:700;">iniciar sesión</a> para subir recursos.
        </div>

        <!-- TABS: NO usar onclick inline → se enlaza en el módulo -->
        <div style="display:flex;gap:1rem;margin-bottom:1.5rem;border-bottom:2px solid #e5e7eb;padding-bottom:0.5rem;">
            <button id="tabArchivo" class="tab-btn tab-active" data-tab="archivo">📄 Archivo</button>
            <button id="tabEnlace"  class="tab-btn"            data-tab="enlace">🔗 Enlace externo</button>
        </div>

        <style>
            .tab-btn        { background:none;border:none;padding:.4rem 1rem;cursor:pointer;font-size:.9rem;border-radius:6px;color:#6b7280;font-weight:500; }
            .tab-active     { background:#e3f2fd;color:#1565c0; }
            .sub-input      { width:100%;padding:.6rem .8rem;border:1px solid #d1d5db;border-radius:8px;font-size:.95rem;box-sizing:border-box;margin-bottom:1rem;background:var(--bg-card,#fff);color:var(--text-primary,#1f2937); }
            textarea.sub-input { min-height:90px;resize:vertical; }
            .sub-label      { display:block;font-size:.85rem;font-weight:600;color:var(--text-primary,#374151);margin-bottom:.3rem; }
            .btn-sub        { background:#1565c0;color:#fff;border:none;padding:.7rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;width:100%;font-weight:600; }
            .btn-sub:disabled { opacity:.5;cursor:not-allowed; }
            .tag-wrap       { display:flex;gap:.5rem;flex-wrap:wrap;border:1px solid #d1d5db;border-radius:8px;padding:.4rem;margin-bottom:1rem; }
            .tag-chip       { background:#e3f2fd;color:#1565c0;border-radius:999px;padding:2px 10px;font-size:.82rem;display:flex;align-items:center;gap:4px; }
            .tag-chip button{ background:none;border:none;cursor:pointer;font-size:.75rem;color:#1565c0;padding:0; }
            .file-drop      { border:2px dashed #d1d5db;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:.2s;margin-bottom:1rem; }
            .file-drop.over { border-color:#1565c0;background:rgba(21,101,192,.05); }
            .prog-wrap      { height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-bottom:1rem;display:none; }
            .prog-fill      { height:100%;background:#1565c0;width:0%;transition:width .4s; }
            #msgSubir       { margin-top:.75rem;font-size:.9rem;min-height:1.2em; }
            .url-ok         { font-size:.82rem;margin-top:-.5rem;margin-bottom:.5rem; }
        </style>

        <!-- ── FORMULARIO ARCHIVO ── -->
        <div id="panelArchivo">
            <label class="sub-label">Título *</label>
            <input id="labNombre" class="sub-input" placeholder="Ej: Laboratorio de Subnetting IPv4">

            <label class="sub-label">Descripción *</label>
            <textarea id="labDescripcion" class="sub-input" placeholder="Describe brevemente el contenido..."></textarea>

            <label class="sub-label">Categoría *</label>
            <select id="labCategoria" class="sub-input">
                <option value="">— Selecciona —</option>
                <option>Programación</option><option>Seguridad</option><option>Redes</option>
                <option>IA</option><option>Bases de datos</option><option>Web</option><option>Otro</option>
            </select>

            <label class="sub-label">Tags (opcional)</label>
            <div class="tag-wrap" id="tagWrap">
                <input id="tagInput" placeholder="Escribe un tag y Enter"
                       style="border:none;outline:none;flex:1;min-width:100px;font-size:.9rem;background:transparent;">
            </div>

            <label class="sub-label">Archivo *</label>
            <div class="file-drop" id="fileDrop">
                <div id="fileDropText">📁 Arrastra tu archivo aquí o <u>haz clic para seleccionar</u></div>
                <div id="fileInfo" style="display:none;font-weight:600;color:#1565c0;"></div>
            </div>
            <input type="file" id="labArchivo" style="display:none;"
                   accept=".pdf,.doc,.docx,.ppt,.pptx,.zip,.rar,.py,.ipynb,.txt,.csv,.xlsx,.mp4,.jpg,.jpeg,.png,.webp">

            <div class="prog-wrap" id="progressBar"><div class="prog-fill" id="progressFill"></div></div>

            <small style="display:block;margin-bottom:1rem;color:#9ca3af;">
                PDF, Word, PPT, ZIP, Python, Jupyter, imágenes, vídeo — máx. 50 MB
            </small>

            <!-- ✅ FIX: sin onclick inline — el listener se agrega en el módulo -->
            <button class="btn-sub" id="btnSubir">📤 Subir laboratorio</button>
        </div>

        <!-- ── FORMULARIO ENLACE ── -->
        <div id="panelEnlace" style="display:none;">
            <label class="sub-label">Título *</label>
            <input id="linkNombre" class="sub-input" placeholder="Ej: Guía de laboratorio en OneDrive">

            <label class="sub-label">Descripción *</label>
            <textarea id="linkDescripcion" class="sub-input" placeholder="Describe el contenido del enlace..."></textarea>

            <label class="sub-label">Categoría *</label>
            <select id="linkCategoria" class="sub-input">
                <option value="">— Selecciona —</option>
                <option>Programación</option><option>Seguridad</option><option>Redes</option>
                <option>IA</option><option>Bases de datos</option><option>Web</option><option>Otro</option>
            </select>

            <label class="sub-label">URL del recurso *</label>
            <input id="linkURL" class="sub-input" type="url" placeholder="https://1drv.ms/... o https://drive.google.com/...">
            <div id="urlPreview" class="url-ok"></div>

            <label class="sub-label">Tags (opcional)</label>
            <div class="tag-wrap" id="tagWrapLink">
                <input id="tagInputLink" placeholder="Escribe un tag y Enter"
                       style="border:none;outline:none;flex:1;min-width:100px;font-size:.9rem;background:transparent;">
            </div>

            <!-- ✅ FIX: sin onclick inline -->
            <button class="btn-sub" id="btnLink">🔗 Guardar enlace</button>
        </div>

        <div id="msgSubir"></div>
    </div>
</div>

<script type="module">
// ════════════════════════════════════════════════════════════════════════════
//  CAUSA DEL BUG "submitArchivo is not defined":
//
//  Cuando el HTML tiene onclick="submitArchivo()" y la función está dentro de
//  <script type="module">, el browser no puede encontrarla porque los módulos
//  ES tienen scope propio y NO exponen funciones al scope global (window)
//  automáticamente. Aunque uses window.submitArchivo = function(){} DENTRO
//  del módulo, el onclick="" del HTML se evalúa ANTES de que el módulo cargue
//  (los módulos son diferidos), así que window.submitArchivo todavía es
//  undefined cuando el usuario hace clic por primera vez.
//
//  SOLUCIÓN CORRECTA: eliminar onclick="" del HTML y usar addEventListener
//  dentro del módulo. Así el listener se registra cuando el módulo ya cargó.
// ════════════════════════════════════════════════════════════════════════════

import { uploadLab, saveLinkLab, validarURL, detectarTipoEnlace } from '../js/labs.js';
import { initAuth } from '../js/auth.js';

// ── Estado ────────────────────────────────────────────────────────────────────
let user         = null;
let selectedFile = null;
const tags       = [];
const tagsLink   = [];

// ── Auth guard ────────────────────────────────────────────────────────────────
user = await initAuth();
if (!user) {
    document.getElementById('noAuthMsg').style.display     = 'block';
    document.getElementById('panelArchivo').style.opacity  = '0.35';
    document.getElementById('panelEnlace').style.opacity   = '0.35';
    document.getElementById('btnSubir').disabled = true;
    document.getElementById('btnLink').disabled  = true;
} else {
    document.getElementById('userInfo').style.display          = 'block';
    document.getElementById('userEmailDisplay').textContent    = user.email;
}

// ── Tabs (listener en módulo, no onclick inline) ──────────────────────────────
document.getElementById('tabArchivo').addEventListener('click', () => switchTab('archivo'));
document.getElementById('tabEnlace').addEventListener('click',  () => switchTab('enlace'));

function switchTab(tab) {
    document.getElementById('panelArchivo').style.display = tab === 'archivo' ? '' : 'none';
    document.getElementById('panelEnlace').style.display  = tab === 'enlace'  ? '' : 'none';
    document.getElementById('tabArchivo').className = 'tab-btn' + (tab === 'archivo' ? ' tab-active' : '');
    document.getElementById('tabEnlace').className  = 'tab-btn' + (tab === 'enlace'  ? ' tab-active' : '');
}

// ── Tags ──────────────────────────────────────────────────────────────────────
document.getElementById('tagInput').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase();
    if (val && !tags.includes(val) && tags.length < 8) { tags.push(val); renderTags(); }
    e.target.value = '';
});

document.getElementById('tagInputLink').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase();
    if (val && !tagsLink.includes(val) && tagsLink.length < 8) { tagsLink.push(val); renderTagsLink(); }
    e.target.value = '';
});

function renderTags() {
    const wrap = document.getElementById('tagWrap');
    wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
    tags.forEach((t, i) => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.innerHTML = `${t} <button type="button">✕</button>`;
        chip.querySelector('button').onclick = () => { tags.splice(i,1); renderTags(); };
        wrap.insertBefore(chip, document.getElementById('tagInput'));
    });
}

function renderTagsLink() {
    const wrap = document.getElementById('tagWrapLink');
    wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
    tagsLink.forEach((t, i) => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.innerHTML = `${t} <button type="button">✕</button>`;
        chip.querySelector('button').onclick = () => { tagsLink.splice(i,1); renderTagsLink(); };
        wrap.insertBefore(chip, document.getElementById('tagInputLink'));
    });
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('fileDrop');

dropZone.addEventListener('dragover',  (e) => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('over'));
dropZone.addEventListener('drop',      (e) => { e.preventDefault(); dropZone.classList.remove('over'); setFile(e.dataTransfer.files[0]); });
dropZone.addEventListener('click',     ()  => document.getElementById('labArchivo').click());

document.getElementById('labArchivo').addEventListener('change', (e) => {
    if (e.target.files[0]) setFile(e.target.files[0]);
});

function setFile(f) {
    selectedFile = f;
    document.getElementById('fileDropText').style.display = 'none';
    const info = document.getElementById('fileInfo');
    info.style.display  = 'block';
    info.innerHTML = `✅ <strong>${f.name}</strong> (${(f.size/1024/1024).toFixed(1)} MB)`;
}

// ── URL Preview ───────────────────────────────────────────────────────────────
document.getElementById('linkURL').addEventListener('input', (e) => {
    const prev = document.getElementById('urlPreview');
    const url  = e.target.value.trim();
    if (!url) { prev.textContent = ''; return; }
    if (validarURL(url)) {
        const tipo  = detectarTipoEnlace(url);
        const icons = { video:'🎬', onedrive:'☁️', 'google-drive':'📁', dropbox:'📦', enlace:'🔗' };
        prev.innerHTML   = `<span style="color:#059669;">${icons[tipo]||'🔗'} Detectado: <strong>${tipo}</strong> ✅</span>`;
    } else {
        prev.innerHTML = '<span style="color:#dc2626;">❌ URL no válida</span>';
    }
});

// ── Helpers UI ────────────────────────────────────────────────────────────────
function showMsg(html, ok = false) {
    const el = document.getElementById('msgSubir');
    el.innerHTML    = html;
    el.style.color  = ok ? '#059669' : '#dc2626';
}

function clearMsg() {
    document.getElementById('msgSubir').innerHTML = '';
}

// ── SUBMIT ARCHIVO (listener en módulo = siempre disponible) ─────────────────
document.getElementById('btnSubir').addEventListener('click', async () => {
    if (!user) { showMsg('❌ Debes iniciar sesión.'); return; }

    const title = document.getElementById('labNombre').value.trim();
    const desc  = document.getElementById('labDescripcion').value.trim();
    const cat   = document.getElementById('labCategoria').value;
    const btn   = document.getElementById('btnSubir');
    const pb    = document.getElementById('progressBar');
    const fill  = document.getElementById('progressFill');

    if (!title)       { showMsg('❌ Ingresa un título.');        return; }
    if (!desc)        { showMsg('❌ Ingresa una descripción.');  return; }
    if (!cat)         { showMsg('❌ Selecciona una categoría.'); return; }
    if (!selectedFile){ showMsg('❌ Selecciona un archivo.');    return; }
    if (selectedFile.size > 50*1024*1024) { showMsg('❌ El archivo supera los 50 MB.'); return; }

    btn.disabled    = true;
    btn.textContent = '⏳ Subiendo...';
    clearMsg();
    pb.style.display = 'block';
    fill.style.width = '30%';

    setTimeout(() => { fill.style.width = '65%'; }, 700);

    const res = await uploadLab(selectedFile, title, desc, cat, tags);
    fill.style.width = '100%';

    setTimeout(() => { pb.style.display = 'none'; fill.style.width = '0%'; }, 600);

    if (res?.success) {
        showMsg('✅ ¡Laboratorio subido correctamente!', true);
        setTimeout(() => { location.hash = res.lab?.id ? `detalle?id=${res.lab.id}` : 'laboratorios'; }, 1400);
    } else {
        showMsg('❌ ' + (res?.error || 'Error al subir.'));
        btn.disabled    = false;
        btn.textContent = '📤 Subir laboratorio';
    }
});

// ── SUBMIT ENLACE (listener en módulo) ────────────────────────────────────────
document.getElementById('btnLink').addEventListener('click', async () => {
    if (!user) { showMsg('❌ Debes iniciar sesión.'); return; }

    const title = document.getElementById('linkNombre').value.trim();
    const desc  = document.getElementById('linkDescripcion').value.trim();
    const cat   = document.getElementById('linkCategoria').value;
    const url   = document.getElementById('linkURL').value.trim();
    const btn   = document.getElementById('btnLink');

    if (!title)           { showMsg('❌ Ingresa un título.');        return; }
    if (!desc)            { showMsg('❌ Ingresa una descripción.');  return; }
    if (!cat)             { showMsg('❌ Selecciona una categoría.'); return; }
    if (!validarURL(url)) { showMsg('❌ Ingresa una URL válida.');   return; }

    btn.disabled    = true;
    btn.textContent = '⏳ Guardando...';
    clearMsg();

    const res = await saveLinkLab(url, title, desc, cat, tagsLink);

    if (res?.success) {
        showMsg('✅ ¡Enlace guardado correctamente!', true);
        setTimeout(() => { location.hash = res.lab?.id ? `detalle?id=${res.lab.id}` : 'laboratorios'; }, 1400);
    } else {
        showMsg('❌ ' + (res?.error || 'Error al guardar.'));
        btn.disabled    = false;
        btn.textContent = '🔗 Guardar enlace';
    }
});
</script>
